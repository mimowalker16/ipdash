# ─── IPDash — Nginx Reverse Proxy Config ──────────────────────────────────────
#
# 1. Copy this file to /etc/nginx/sites-available/ipdash
# 2. Run: sudo ln -s /etc/nginx/sites-available/ipdash /etc/nginx/sites-enabled/
# 3. Replace every occurrence of YOUR_DOMAIN with your actual domain (e.g. ipdash.io)
# 4. Run: sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# 5. Reload: sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (managed by Certbot — do not edit manually) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Rate limiting (protects /api/dns from abuse) ──────────────────────────
    # Define these in nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=10 nodelay;
    limit_req_status 429;

    # ── Real IP extraction ────────────────────────────────────────────────────
    # Tells Nginx to trust its own loopback and pass the original client IP.
    set_real_ip_from   127.0.0.1;
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;

    # ── Proxy to Next.js (PM2 running on port 3000) ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        # Forward the real client IP so /api/ip reads it correctly.
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
